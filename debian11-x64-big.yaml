#==============================================================================
# vim: softtabstop=2 shiftwidth=2 expandtab fenc=utf-8 cc=81 tw=80
#==============================================================================
#
# DESCRIPTION: Debian bullseye (11) x64 big Grid'5000 environment
#
#==============================================================================
---
extend: ./debian11-x64-common.yaml

global:
  # Grid'5000 environment variant
  g5k_variant: big
  # Grid'5000 Kadeploy environment parameters
  g5k_postinst_script: g5k-postinstall --net debian --net hpc --fstab nfs --fstab ondemand --restrict-user current --disk-aliases
  # QEMU options
  image_size: 28G
  kernel_version: 6.1
  kernel_package: linux-image-$${kernel_version}-$${deb_arch}
  kernel_headers: linux-headers-$${kernel_version}-$${deb_arch}

bootstrap:
  - "@base"

setup:
  - install_custom_kernel:
    - update_apt:
      - apt-get_in: update
    - install_linux_image:
      - apt-get_in: install $${kernel_package} $${kernel_headers}
  - "@base"

export:
  - "@base"
