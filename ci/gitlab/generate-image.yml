spec:
  inputs:
    autostart:
      type: boolean
    environment-name:
---

"gen-$[[ inputs.environment-name ]]":
  stage: generate
  variables:
    AUTOSTART: $[[ inputs.autostart ]]
    ENV_NAME: $[[ inputs.environment-name ]]
    # The next two variables are here for the postjob-cleanup.
    OAR_ID_FILE: /tmp/oar-job-id-${CI_JOB_ID}.txt
    SITE: nancy
    POSTINSTALL_FILE: ${ROOT_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}/postinstall-${POSTINSTALL_BRANCH}.tgz
  rules:
    # We start the job automatically if we're told to do so, otherwise we put
    # the job in manual mode.
    - if: '$AUTOSTART == "true"'
    - when: manual
  needs:
    - pipeline: $ROOT_PIPELINE_ID
      job: clone-refrepo
  tags:
    - grid5000-shell
  script:
    - |
      echo "Generating ${ENV_NAME}, version ${GENERATED_ENV_VERSION}"
      if [[ ${ENV_NAME} == nixos* ]]; then
        echo "Detected NixOS environment, using NixOS image generation script"
        # Create a .env file to share environment variables with the OAR job
        cd ci/gitlab/generate-nixos-image
        echo "CI_PIPELINE_ID=${CI_PIPELINE_ID}" > .env
        echo "CI_COMMIT_SHORT_SHA=${CI_COMMIT_SHORT_SHA}" >> .env
        echo "ENV_NAME=${ENV_NAME}" >> .env
        echo "GENERATED_ENV_VERSION=${GENERATED_ENV_VERSION}" >> .env
        rsync -rv ./ ajenkins@$SITE:generate-nixos-image/
        ssh ajenkins@$SITE "cd generate-nixos-image && bash submit-oarjob.bash"
      else
        git clone https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.inria.fr/grid5000/jenkins-scripts.git --depth 1 --branch master
        # GENERATED_ENV_VERSION is populated by the "clone-refrepo" job
        RUBYLIB=jenkins-scripts/lib:reference-repository/lib ci/gitlab/run_job.rb --job build --env ${ENV_NAME} --version ${GENERATED_ENV_VERSION} ${POSTINSTALL_BRANCH:+"-p${POSTINSTALL_FILE}"}
      fi
  after_script: !reference [.postjob-cleanup, after_script]
